# configs/router_solver_memory_sim.yaml
# Condition #4b/c: Hierarchical Agent with Similarity-based Memory

model:
  base_id: "Qwen/Qwen2.5-1.5B-Instruct"
  router_adapter_name: "router_lora_memory"
  solver_adapter_name: "solver_lora_memory"

memory:
  enabled: true
  mode: "similarity"
  k: 3
  capacity: 1000
  min_similarity: 0.5
  write_gate_reward_threshold: 1.0

training:
  learning_rate: 5.0e-06
  batch_size: 8
  group_size: 8
  max_steps: 500

logging:
  output_dir: "experiments/router_solver_memory_sim"
  wandb_project: "router-solver"
