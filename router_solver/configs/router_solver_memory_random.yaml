# configs/router_solver_memory_random.yaml
# Condition #4b: Hierarchical Agent with Random Memory (ablation baseline for 4c)

model:
  base_id: "Qwen/Qwen2.5-1.5B-Instruct"

memory:
  enabled: true
  mode: "random"
  k: 3

training:
  learning_rate: 5.0e-06
  batch_size: 8
  group_size: 8
  max_steps: 500

logging:
  output_dir: "experiments/router_solver_memory_random"
  wandb_project: "router-solver"
