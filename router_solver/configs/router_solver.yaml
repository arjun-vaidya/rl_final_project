# Conditions #3 and #4: Router-Solver GRPO.
# Switch reward_mode between "outcome_only" (→ Cond #3) and "decomposed" (→ Cond #4).
# Spec: docs/04_design.md + docs/05_evaluation.md.

run_name: router_solver_decomposed_v1
seed: 0

model:
  base: Qwen/Qwen2.5-1.5B-Instruct
  router_lora_rank: 16
  solver_lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.0

env:
  dataset: gsm8k
  tool: python
  tool_timeout_s: 5
  max_output_chars: 256

agent:
  type: router_solver
  max_subgoals: 6
  router_max_tokens: 256
  solver_max_tokens: 128

reward:
  mode: decomposed       # or: outcome_only  (for Condition #3)
  solver_weights:
    tool_valid: 0.3
    sensible_output: 0.2
    final_outcome: 0.5

memory:
  enabled: false         # Condition #4a

grpo:
  group_size: 8
  batch_size: 8
  learning_rate: 5.0e-6
  kl_beta: 0.04
  num_steps: 500
  joint_or_alternating: joint

eval:
  every_n_steps: 50
  val_size: 200

logging:
  wandb_project: router_solver
