# configs/router_solver.yaml
# Condition #4: Hierarchical Agent (Router + Solver) with Decomposed Rewards

model:
  base_id: "Qwen/Qwen2.5-1.5B-Instruct"
  router_adapter_name: "router_lora"
  solver_adapter_name: "solver_lora"
  lora_r: 16
  lora_alpha: 32

training:
  algorithm: "GRPO"
  learning_rate: 5.0e-06
  beta: 0.04
  batch_size: 8
  group_size: 8
  max_steps: 500
  reward_mode: "decomposed" # vs "outcome_only" for Condition #3

rollout:
  max_subgoals: 6
  router_max_tokens: 256
  solver_max_tokens: 128

logging:
  output_dir: "experiments/router_solver_decomposed"
  wandb_project: "router-solver"
